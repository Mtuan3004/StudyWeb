<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>

    <div class="card">
        <div class="card__heart">
            <i class="ri-poker-hearts-line"></i>
        </div>
        <div class="card__cart">
            <i class="ri-shopping-cart-line"></i>
        </div>
        <div class="card__img">
            <img src="./Img/pngwing.com.png" alt="Shoes">
        </div>
        <div class="card__content">
            <div class="card__title">
                Nike Mercurial Vapor 11
            </div>
            <div class="card__price">
                $300
            </div>
            <div class="card__animation">
                <div class="card__size">
                    <h3>Size: </h3>
                    <span>6</span>
                    <span>7</span>
                    <span>8</span>
                    <span>9</span>
                </div>
                <div class="card__color">
                    <h3>Color: </h3>
                    <div class="card__color--blue"></div>
                    <div class="card__color--white"></div>
                    <div class="card__color--pink"></div>
                </div>
                <div class="card__action">
                    <button>Buy Now</button>
                    <button>Add Cart</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
